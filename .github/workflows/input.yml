name: input_workflow
on: 
  workflow_dispatch:
    inputs:
      environment:
        description: Choose the environment to deploy
        required: true
        type: choice
        options:
          - dev
          - prod
          - uat
          - pilot
jobs:
  deploy_input:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying To Environment
        run: | 
          echo "Deploying to ${{inputs.environment}}"
          echo "Deploying from ${{github.repository}}"
          echo "Deployment by ${{github.actor}}"
